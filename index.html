<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Gestão de Ferramentas</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

<header id="mainHeader" class="hidden">

  <div class="header-inner">

    <strong class="header-title">
      Gestão de Ferramentas
    </strong>

    <div class="header-right">

      <!-- PERFIL -->
      <div class="perfil-wrapper">

        <span id="headerPerfil" class="header-perfil">
          perfil ▾
        </span>

        <div id="perfilMenu" class="perfil-menu hidden">

          <button onclick="abrirConfiguracoes()">
            Configurações
          </button>

          <button onclick="logout()">
            Sair
          </button>

        </div>

      </div>

      <!-- MENU -->
      <div class="menu-wrapper">

        <button id="menuToggle" class="menu-btn">
          ⋮
        </button>

        <div id="menuDropdown" class="menu-dropdown hidden"></div>

      </div>

    </div>

  </div>

</header>

<div id="app">

  <!-- LOGIN -->
  <div id="loginView" class="card">

    <h2>Login</h2>

    <input
      id="loginEmail"
      type="email"
      placeholder="email@empresa.com"
    >

    <input
      id="loginPassword"
      type="password"
      placeholder="Senha"
    >

    <button id="btnLogin">
      Entrar
    </button>

    <p class="link" id="btnShowRegister">
      Criar conta
    </p>

  </div>

  <!-- CADASTRO -->
  <div id="registerView" class="card hidden">

    <h2>Cadastro</h2>

    <input
      id="regName"
      placeholder="Nome completo"
    >

    <input
      id="regEmail"
      type="email"
      placeholder="Email"
    >

    <input
      id="regPassword"
      type="password"
      placeholder="Senha"
    >

    <select id="regRole">
      <option value="tecnico">Técnico</option>
      <option value="admin">Administrador</option>
    </select>

    <button id="btnRegister">
      Cadastrar
    </button>

    <p class="link" id="btnShowLogin">
      Voltar
    </p>

  </div>

  <!-- TÉCNICO -->
  <div id="techView" class="card hidden">

    <h2>Checklist Mensal</h2>

    <div id="avisoJaRespondeu" class="aviso hidden">
      ⚠️ Você já respondeu o checklist deste mês.
    </div>

    <form id="checklistForm"></form>

    <button id="btnEnviarChecklist">
      Enviar checklist do mês
    </button>

  </div>

  <!-- SETTINGS -->
  <div id="settingsView" class="card hidden">

    <h2>Configurações</h2>

    <div class="perfil-edit-area">

      <label>Email:</label>

      <input
        type="email"
        id="meuEmail"
        readonly
        style="background:#eee;"
      >

      <label>Telefone:</label>

      <input
        type="text"
        id="meuTelefone"
        placeholder="(41) 99999-9999"
      >

      <label>Teams:</label>

      <input
        type="text"
        id="meuTeams"
        placeholder="Link do Teams"
      >

      <div class="button-group">

        <button id="btnSalvarDadosTecnico">
          Salvar Alterações
        </button>

        <button
          onclick="voltarDoSettings()"
          class="btn-secondary"
        >
          Voltar
        </button>

      </div>

    </div>

  </div>

  <!-- ADMIN -->
  <div id="adminView" class="card hidden">

    <h2>Administração</h2>

    <p>
      ✅ OK:
      <strong id="countOk">0</strong>

      |

      ⚠️ Problemas:
      <strong id="countProblemas">0</strong>

      |

      ❌ Pendentes:
      <strong id="countPendente">0</strong>
    </p>

    <table id="tabelaTecnicos" border="1" width="100%">

      <thead>
        <tr>
          <th>Técnico</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody></tbody>

    </table>

    <button id="btnExportarExcel">
      📊 Exportar Excel
    </button>

  </div>

</div>

<!-- MODAL -->
<div id="modalTecnico" class="modal hidden">

  <div class="modal-content">

    <h2>Dados do Técnico</h2>

    <label>Email:</label>

    <input
      type="email"
      id="modalEmail"
      readonly
    >

    <label>Telefone:</label>

    <input
      type="text"
      id="modalTelefone"
      readonly
    >

    <label>Teams:</label>

    <input
      type="text"
      id="modalTeams"
      readonly
    >

    <div class="modal-actions">

      <button onclick="fecharModalTecnico()">
        Fechar
      </button>

    </div>

  </div>

</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<script type="module" src="./script.js"></script>

</body>
</html>
